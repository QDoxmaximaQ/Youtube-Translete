<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YT Subtitle AI Settings</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1 class="app-title" data-i18n="APP_TITLE">SİSTEM AYARLARI</h1>
        <div class="header-controls">
            <select id="menuLangSelect" class="lang-select">
                <option value="tr">Türkçe</option>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="ja">日本語</option>
            </select>
        </div>
        <div id="statusBar" class="status-bar" data-i18n="STATUS_READY">SİSTEM: HAZIR</div>
    </header>

    <div class="container">
        <!-- TOGGLE -->
        <section class="section flex-between glass-panel">
            <div class="section-title no-margin text-gradient-cyan" data-i18n="EXT_STATUS">UZANTI DURUMU</div>
            <div class="toggle-container">
                <span id="statusText" data-i18n="INACTIVE">Pasif</span>
                <button id="toggleBtn" class="toggle-btn premium-toggle">
                    <span class="toggle-track">
                        <span class="toggle-thumb" id="toggleThumb"></span>
                    </span>
                </button>
            </div>
            <div id="statusDot" style="display:none;"></div>
        </section>

        <!-- API KEYS -->
        <section class="section glass-panel">
            <div class="section-title text-gradient-orange" data-i18n="API_SYSTEM">API KEY KAYIT SİSTEMİ</div>
            <div class="grid-2">
                <div class="input-group">
                    <label>GEMINI API KEY</label>
                    <input type="password" id="geminiKeyInput" placeholder="Gemini Key..." autocomplete="off" class="premium-input">
                </div>
                <div class="input-group">
                    <label>GROQ API KEY</label>
                    <input type="password" id="groqKeyInput" placeholder="Groq Key..." autocomplete="off" class="premium-input">
                </div>
                <div class="input-group">
                    <label class="text-blue">DEEPL API KEY</label>
                    <input type="password" id="deeplKeyInput" placeholder="DeepL Key..." autocomplete="off" class="premium-input">
                </div>
            </div>
        </section>

        <!-- AI KONTROL MERKEZİ -->
        <section class="section glass-panel">
            <div class="section-title text-gradient-cyan" data-i18n="AI_CONTROL">AI KONTROL MERKEZİ</div>
            <div class="grid-2">
                <div class="input-group">
                    <label data-i18n="TRANSLATOR_MODEL">Çeviri Motoru (Model)</label>
                    <select id="modelSelect" class="premium-select"></select>
                    <p id="modelId" class="hint"></p>
                </div>
                <div class="input-group" id="aiTranslationModeContainer">
                    <label data-i18n="TRANSLATOR_LANG">Çeviri Dili (Hedef/Stil)</label>
                    <select id="modeSelect" class="premium-select"></select>
                </div>
            </div>

            <!-- DEEPL TRANSLATION MODE -->
            <div class="grid-2" id="deeplLanguageContainer" style="display:none; margin-top: 16px;">
                <div class="input-group">
                    <label data-i18n="SOURCE_LANG">Kaynak Dil (Source)</label>
                    <select id="deeplSourceSelect" class="premium-select">
                        <option value="auto">Otomatik (Auto)</option>
                        <option value="en">İngilizce (EN)</option>
                        <option value="de">Almanca (DE)</option>
                        <option value="fr">Fransızca (FR)</option>
                        <option value="es">İspanyolca (ES)</option>
                        <option value="it">İtalyanca (IT)</option>
                        <option value="ja">Japonca (JA)</option>
                        <option value="zh">Çince (ZH)</option>
                        <option value="ru">Rusça (RU)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label data-i18n="TARGET_LANG">Hedef Dil (Target)</label>
                    <select id="deeplTargetSelect" class="premium-select">
                        <option value="tr">Türkçe (TR)</option>
                        <option value="en">İngilizce (EN)</option>
                        <option value="de">Almanca (DE)</option>
                        <option value="fr">Fransızca (FR)</option>
                        <option value="es">İspanyolca (ES)</option>
                        <option value="it">İtalyanca (IT)</option>
                        <option value="ja">Japonca (JA)</option>
                        <option value="zh">Çince (ZH)</option>
                        <option value="ru">Rusça (RU)</option>
                        <option value="az">Azerbaycanca (AZ)</option>
                        <option value="uk">Ukraynaca (UK)</option>
                        <option value="pt">Portekizce (PT)</option>
                    </select>
                </div>
            </div>

            <!-- CHUNK AYARLARI -->
            <div class="section-title text-gradient-cyan mt-4" style="margin-top: 20px;" data-i18n="CHUNK_SETTINGS">MOTOR KAPASİTE AYARLARI (CHUNK)</div>
            <div class="grid-3">
                <div class="input-group">
                    <label data-i18n="GEMINI_PROMPT">Gemini (Satır/Parça)</label>
                    <input type="text" id="geminiChunk" class="premium-input" placeholder="Örn: 400 veya full" />
                </div>
                <div class="input-group">
                    <label data-i18n="GROQ_PROMPT">Groq/Llama (Satır/Parça)</label>
                    <input type="text" id="groqChunk" class="premium-input" placeholder="Örn: 100 veya full" />
                </div>
                <div class="input-group" style="grid-column: 1 / -1;">
                    <label>DeepL (Satır/Parça)</label>
                    <input type="text" id="deeplChunk" class="premium-input" placeholder="Örn: 150 veya full" />
                </div>
            </div>

            </section>

        <!-- ÖZEL PROMPTLAR -->
        <section class="section glass-panel">
            <div class="section-title text-gradient-cyan" data-i18n="CUSTOM_PROMPTS">ÖZEL PROMPTLAR</div>
            <div class="grid-2">
                <div class="input-group">
                    <label class="text-blue" data-i18n="GEMINI_PROMPT">Gemini Özel Prompt</label>
                    <textarea id="geminiPrompt" class="premium-input" placeholder="..."></textarea>
                </div>
                <div class="input-group">
                    <label class="text-orange" data-i18n="GROQ_PROMPT">Groq Özel Prompt</label>
                    <textarea id="groqPrompt" class="premium-input" placeholder="..."></textarea>
                </div>
            </div>
        </section>

        <!-- ALTYAZI OYNATICI (PLAYER) AYARLARI -->
        <section class="section glass-panel">
            <div class="section-title text-gradient-cyan flex-between-center">
                <span data-i18n="PLAYER_SETTINGS">ALTYAZI OYNATICI AYARLARI</span>
                <div class="toggle-container" style="padding:0; background:none; border:none; width:auto; box-shadow:none;">
                    <span id="playerToggleText" style="margin-right:10px; font-size:10px; font-weight:bold; color:#00ffd5;" data-i18n="ON">AÇIK</span>
                    <button id="playerToggleBtn" class="toggle-btn premium-toggle">
                        <span class="toggle-track active" id="playerToggleTrack">
                            <span class="toggle-thumb active" id="playerToggleThumb"></span>
                        </span>
                    </button>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="input-group">
                    <label data-i18n="FONT_FAMILY">Yazı Fontu</label>
                    <select id="playerFontFamily" class="premium-select">
                        <option value='"YouTube Noto", Roboto, "Arial Unicode Ms", Arial, Helvetica, Verdana, PT Sans Caption, sans-serif'>Varsayılan (Roboto)</option>
                        <option value='Arial, sans-serif'>Arial</option>
                        <option value='"Courier New", Courier, monospace'>Courier New</option>
                        <option value='"Times New Roman", Times, serif'>Times New Roman</option>
                        <option value='"Comic Sans MS", cursive, sans-serif'>Comic Sans</option>
                        <option value='Impact, sans-serif'>Impact</option>
                    </select>
                </div>
                <div class="input-group">
                    <label data-i18n="FONT_SIZE">Yazı Boyutu</label>
                    <input type="range" id="playerFontSize" min="10" max="60" value="24" class="premium-range">
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label data-i18n="TEXT_COLOR">Yazı Rengi</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="playerTextColor" value="#ffffff">
                    </div>
                </div>
                <div class="input-group">
                    <label data-i18n="BG_COLOR">Arka Plan Rengi</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="playerBgColor" value="#080808">
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label data-i18n="BG_OPACITY">Arka Plan Saydamlığı (%)</label>
                    <input type="range" id="playerBgOpacity" min="0" max="100" value="75" class="premium-range">
                </div>
                <div class="input-group">
                    <label data-i18n="LINE_GAP">Satır Arası Mesafe (px)</label>
                    <input type="range" id="playerLineGap" min="0" max="30" value="4" class="premium-range">
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <button id="playerResetPosBtn" class="premium-btn reset-btn" data-i18n="RESET_POS">KONUMU SIFIRLA</button>
                </div>
                <div class="input-group"></div>
            </div>
            <p class="drag-hint" data-i18n="DRAG_HINT">İpucu: Altyazıyı ekranda farenizle tutup istediğiniz yere sürükleyebilirsiniz.</p>
        </section>

        <!-- KAYDET BUTONU -->
        <button id="saveBtn" class="save-btn premium-save-btn" data-i18n="SAVE_BTN">AYARLARI KAYDET</button>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
